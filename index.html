<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RetailCorp Support Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: #1a73e8;
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: bold; }
  header span { font-size: 13px; opacity: 0.85; }

  #deptInfo {
    font-size: 13px;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 4px;
    display: none;
  }

  /* Main */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Department Picker */
  #picker {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  #picker h2 {
    font-size: 22px;
    margin-bottom: 8px;
    color: #222;
  }
  #picker p {
    color: #666;
    margin-bottom: 32px;
    font-size: 14px;
  }

  .dept-list {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dept-btn {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px 32px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    color: #333;
    min-width: 160px;
    text-align: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .dept-btn:hover {
    background: #1a73e8;
    color: white;
    border-color: #1a73e8;
  }
  .dept-btn small {
    display: block;
    font-weight: normal;
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.7;
  }

  /* Chat */
  #chatview {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  #chatview.active { display: flex; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 680px;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-label {
    font-size: 11px;
    font-weight: bold;
    color: #999;
    margin-bottom: 4px;
  }

  .msg-bubble {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 560px;
  }
  .msg.user .msg-bubble {
    background: #1a73e8;
    color: white;
    border-color: #1a73e8;
  }

  .msg-title {
    font-weight: bold;
    margin-bottom: 6px;
    color: #1a73e8;
    font-size: 14px;
  }
  .msg.user .msg-title { display: none; }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    padding: 5px 12px;
    background: #f0f2f5;
    border: 1px solid #ccc;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    color: #444;
  }
  .chip:hover { background: #1a73e8; color: white; border-color: #1a73e8; }

  /* Typing */
  .typing { display: flex; gap: 5px; padding: 14px 16px; align-items: center; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%;
    background: #aaa; animation: blink 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

  /* Input */
  .input-area {
    background: white;
    border-top: 1px solid #ddd;
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #msgInput {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    outline: none;
  }
  #msgInput:focus { border-color: #1a73e8; }

  #sendBtn {
    padding: 10px 20px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  #sendBtn:hover { background: #1558b0; }
  #sendBtn:disabled { background: #aaa; cursor: not-allowed; }

  #switchBtn {
    padding: 8px 14px;
    background: white;
    color: #1a73e8;
    border: 1px solid #1a73e8;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  #switchBtn:hover { background: #e8f0fe; }
</style>
</head>
<body>

<header>
  <h1>RetailCorp Support Chatbot</h1>
  <div id="deptInfo"></div>
</header>

<main>

  <!-- Department Picker -->
  <div id="picker">
    <h2>Select Your Department</h2>
    <p>Choose the department you need help with to get started.</p>
    <div class="dept-list" id="deptList"></div>
  </div>

  <!-- Chat View -->
  <div id="chatview">
    <div id="messages"></div>
    <div class="input-area">
      <button id="switchBtn" onclick="switchDept()">Change Dept</button>
      <input type="text" id="msgInput" placeholder="Type your question and press Enter..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

</main>

<script>
  let currentDept = null;

  const DEPT_DESC = {
    "HR": "People & Policies",
    "IT Support": "Tech Help",
    "Finance": "Payments & Budgets"
  };

  async function init() {
    const res = await fetch("/api/departments");
    const depts = await res.json();
    const list = document.getElementById("deptList");
    depts.forEach(d => {
      const btn = document.createElement("button");
      btn.className = "dept-btn";
      btn.innerHTML = `${d.name}<small>${DEPT_DESC[d.name] || ""}</small>`;
      btn.onclick = () => selectDept(d.name, d.suggestions);
      list.appendChild(btn);
    });
  }

  function selectDept(name, suggestions) {
    currentDept = name;
    document.getElementById("picker").style.display = "none";
    const cv = document.getElementById("chatview");
    cv.classList.add("active");
    document.getElementById("deptInfo").textContent = "Department: " + name;
    document.getElementById("deptInfo").style.display = "block";
    document.getElementById("messages").innerHTML = "";

    addBotMsg(
      "Welcome to " + name,
      "Hello! You are connected to the " + name + " support desk. How can I help you today? You can also click one of the suggested topics below.",
      suggestions
    );
    document.getElementById("msgInput").focus();
  }

  function switchDept() {
    currentDept = null;
    document.getElementById("chatview").classList.remove("active");
    document.getElementById("picker").style.display = "flex";
    document.getElementById("deptInfo").style.display = "none";
  }

  async function sendMessage() {
    const input = document.getElementById("msgInput");
    const msg = input.value.trim();
    if (!msg || !currentDept) return;
    input.value = "";

    addUserMsg(msg);
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ department: currentDept, message: msg })
      });
      const data = await res.json();
      removeTyping();
      addBotMsg(data.title, data.response, data.suggestions || []);
    } catch (e) {
      removeTyping();
      addBotMsg("Error", "Something went wrong. Please try again.", []);
    }
  }

  function addUserMsg(text) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg user";
    div.innerHTML = `<div><div class="msg-label">You</div><div class="msg-bubble">${esc(text)}</div></div>`;
    msgs.appendChild(div);
    scroll();
  }

  function addBotMsg(title, text, suggestions) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg bot";

    let chips = "";
    if (suggestions && suggestions.length) {
      chips = `<div class="chip-row">${suggestions.map(s =>
        `<span class="chip" onclick="quickSend('${s.replace(/'/g, "\\'")}')">${s}</span>`
      ).join("")}</div>`;
    }

    div.innerHTML = `
      <div>
        <div class="msg-label">Support Bot</div>
        <div class="msg-bubble">
          <div class="msg-title">${esc(title)}</div>
          ${esc(text)}
          ${chips}
        </div>
      </div>`;
    msgs.appendChild(div);
    scroll();
  }

  let typingEl = null;
  function showTyping() {
    const msgs = document.getElementById("messages");
    typingEl = document.createElement("div");
    typingEl.className = "msg bot";
    typingEl.id = "typing";
    typingEl.innerHTML = `<div><div class="msg-label">Support Bot</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    msgs.appendChild(typingEl);
    scroll();
    document.getElementById("sendBtn").disabled = true;
  }
  function removeTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
    document.getElementById("sendBtn").disabled = false;
  }

  function quickSend(text) {
    document.getElementById("msgInput").value = text;
    sendMessage();
  }

  function scroll() {
    const m = document.getElementById("messages");
    m.scrollTop = m.scrollHeight;
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.getElementById("msgInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  init();
</script>
</body>
</html>
